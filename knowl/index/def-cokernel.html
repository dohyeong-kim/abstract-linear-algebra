<div class="para logical">
<div class="para">
<span class="process-math">\(T: V \to W\)</span>가 선형변환일 때, <span class="process-math">\(T\)</span>의 <dfn class="terminology">코커널</dfn>은 공역 <span class="process-math">\(W\)</span>를 <span class="process-math">\(T\)</span>의 치역으로 나눈 몫공간으로 정의되며 <span class="process-math">\(\text{coker}(T)\)</span>로 표기합니다.</div>
<div class="displaymath process-math">
\begin{equation*}
\text{coker}(T) = W / \text{im}(T)
\end{equation*}
</div>
