<div class="para">집합 <span class="process-math">\(I\)</span>에 대하여 각 <span class="process-math">\(i \in I\)</span> 마다 벡터공간 <span class="process-math">\(V_i\)</span> 가 주어졌다고 합시다. 이때, 모든 <span class="process-math">\(i \in I\)</span> 에 대하여 <span class="process-math">\(v_i \in V_i\)</span> 인 원소들의 집합 <span class="process-math">\(\prod_{i \in I} V_i = \{ (v_i)_{i \in I} \mid v_i \in V_i \text{ for all } i \in I \}\)</span> 에 성분별 덧셈과 스칼라 곱셈을 정의하면, 이는 벡터공간이 됩니다. 이를 <dfn class="terminology">임의의 집합으로 매개된 직곱</dfn>이라 합니다. </div>
