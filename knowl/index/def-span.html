<div class="para">벡터 공간 <span class="process-math">\(V\)</span>의 부분집합 <span class="process-math">\(S\)</span>에 대하여, <span class="process-math">\(S\)</span>의 원소들로 만들 수 있는 모든 가능한 선형결합들의 집합을 <span class="process-math">\(S\)</span>의 <dfn class="terminology">스팬</dfn>이라 하고 <span class="process-math">\(\operatorname{span}(S)\)</span>로 표기한다. <aside class="aside aside-like"><div class="para">스팬:span, 생성:generate</div></aside>  수학적 관례에 따라 공집합의 스팬은 영벡터만을 포함하는 집합으로 정의한다. 즉, <span class="process-math">\(\operatorname{span}(\emptyset) = \{ \mathbf{0} \}\)</span> 이다.</div></article><span class="incontext"><a class="internal" href="01-01-vector-spaces.html#def-span">in-context</a></span>
