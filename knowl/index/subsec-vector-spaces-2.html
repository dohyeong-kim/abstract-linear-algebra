<h4 class="heading"><span class="type">문단</span></h4>
<div class="para"> 벡터공간의 정의는 벡터의 덧셈과 스칼라곱의 개념을 추상화한 결과입니다. 이는 두 단계로 진행되며, 우선 스칼라의 개념을 추상화하는 대수적 개념인 체<details class="ptx-footnote" aria-live="polite" id="subsec-vector-spaces-2-2"><summary class="ptx-footnote__number" title="Footnote 1.1.1"><sup> 1 </sup></summary><div class="ptx-footnote__contents" id="subsec-vector-spaces-2-2"><div class="para" id="subsec-vector-spaces-2-2-1">부록의 <a href="sec-fields.html" class="internal" title="Section A.1: 체">Section A.1</a> 참조</div></div></details>를 도입하고, 그 다음으로 벡터의 개념을 추상화하는 벡터공간의 정의로 이어집니다. 체의 개념이나 벡터의 덧셈은 이항연산의 특수한 경우입니다. 한편, 스칼라 곱셈에서는 스칼라와 그것이 곱해지는 대상이 다른 집합에서 택해진다는 점에서 통상의 이항연산과 다릅니다.</div>
