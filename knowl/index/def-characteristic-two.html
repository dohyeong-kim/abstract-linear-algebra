<span class="type">정의</span><span class="space"> </span><span class="codenumber">1.1.19</span><span class="period">.</span><span class="space"> </span><span class="title">표수가 2인 체.</span>
</h5>
<div class="para">체 <span class="process-math">\(\mathbb{F}\)</span>의 곱셈에 대한 항등원 <span class="process-math">\(1\)</span>에 대하여 <span class="process-math">\(1+1=0\)</span>이 성립할 때, <span class="process-math">\(\mathbb{F}\)</span>를 <aside class="aside aside-like"><div class="para">표수:characteristic</div></aside> <dfn class="terminology">표수</dfn>가 2인 체라고 한다. <details class="ptx-footnote" aria-live="polite" id="def-characteristic-two-2-1-7"><summary class="ptx-footnote__number" title="Footnote 1.1.5"><sup> 5 </sup></summary><div class="ptx-footnote__contents" id="def-characteristic-two-2-1-7">이러한 체에서는 임의의 원소 <span class="process-math">\(a \in \mathbb{F}\)</span>에 대하여 <span class="process-math">\(a+a=0\)</span>이 성립하며, 이는 곧 덧셈에 대한 역원이 자기 자신(<span class="process-math">\(-a=a\)</span>)임을 의미한다.</div></details>
