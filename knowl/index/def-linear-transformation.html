<div class="para logical">
<div class="para">
<span class="process-math">\(V\)</span>와 <span class="process-math">\(W\)</span>를 동일한 체 <span class="process-math">\(\mathbb{F}\)</span> 위의 벡터 공간이라 합시다. 함수 <span class="process-math">\(T: V \to W\)</span>가 임의의 벡터 <span class="process-math">\(u, v \in V\)</span>와 스칼라 <span class="process-math">\(c \in \mathbb{F}\)</span>에 대하여 다음 두 조건을 모두 만족할 때, <span class="process-math">\(T\)</span>를 <span class="process-math">\(V\)</span>에서 <span class="process-math">\(W\)</span>로 가는 <dfn class="terminology">선형변환</dfn>이라고 합니다.</div>
<ol class="decimal" id="def-linear-transformation-2-1-11">
<li><div class="para">덧셈의 보존: <span class="process-math">\(T(u + v) = T(u) + T(v)\)</span>
</div></li>
<li><div class="para">스칼라 곱셈의 보존: <span class="process-math">\(T(cu) = cT(u)\)</span>
</div></li>
</ol>
