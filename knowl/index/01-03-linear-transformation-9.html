<div class="para">집합 간 함수의 전사성은 이미지를 이용해 다시 표현할 수 있습니다. 선형 변환 <span class="process-math">\(T: V \to W\)</span>가 전사라는 것은 공역 <span class="process-math">\(W\)</span>의 모든 원소가 정의역 <span class="process-math">\(V\)</span>의 어떤 원소에 의해 매핑된다는 것을 의미합니다. 즉, <span class="process-math">\(\operatorname{im}(T) = W\)</span>입니다. 따라서, 선형 변환이 전사이려면 이미지가 공역 전체와 일치해야 하며, 그 역도 성립합니다. <aside class="aside aside-like"><div class="para">전사:surjective</div></aside> </div>
