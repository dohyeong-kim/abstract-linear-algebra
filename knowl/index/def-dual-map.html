<article class="definition definition-like"><h4 class="heading">
<span class="type">정의</span><span class="space"> </span><span class="codenumber">2.3.12</span><span class="period">.</span><span class="space"> </span><span class="title">쌍대사상.</span>
</h4>
<div class="para">체 <span class="process-math">\(\mathbb{F}\)</span> 상의 두 벡터공간 <span class="process-math">\(V, W\)</span>와 선형변환 <span class="process-math">\(T: V \to W\)</span>가 주어졌다고 합시다. <span class="process-math">\(T\)</span>의 <dfn class="terminology">쌍대사상</dfn><aside class="aside aside-like"><div class="para">쌍대사상:dual transformation</div></aside> <span class="process-math">\(T^*: W^* \to V^*\)</span>는 임의의 선형범함수 <span class="process-math">\(g \in W^*\)</span>에 대하여 다음과 같이 합성함수로 정의합니다.</div> <div class="para"><span class="process-math">\(T^*(g) = g \circ T\)</span></div> <div class="para">즉, 임의의 <span class="process-math">\(v \in V\)</span>에 대하여 <span class="process-math">\((T^*(g))(v) = g(T(v))\)</span>입니다.</div></article><span class="incontext"><a class="internal" href="02-03-product-projection-dual.html#def-dual-map">in-context</a></span>
