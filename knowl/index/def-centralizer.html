<span class="type">정의</span><span class="space"> </span><span class="codenumber">1.1.18</span><span class="period">.</span><span class="space"> </span><span class="title">중심화기.</span>
</h5>
<div class="para logical">
<div class="para">
<span class="process-math">\(V = M_{n \times n}(\mathbb{F})\)</span>를 체 <span class="process-math">\(\mathbb{F}\)</span> 위의 <span class="process-math">\(n \times n\)</span> 행렬들의 벡터 공간이라고 합니다. 고정된 행렬 <span class="process-math">\(M \in V\)</span>에 대하여, <span class="process-math">\(M\)</span>과 교환 법칙이 성립하는 모든 행렬들의 집합을 <span class="process-math">\(M\)</span>의 <dfn class="terminology">중심화기</dfn>라고 부릅니다. 그리고 <span class="process-math">\(C(M)\)</span>으로 표기합니다. 즉,</div>
<div class="displaymath process-math">
\begin{gather*}
C(M) =  \{ A \in V \mid AM = MA \}
\end{gather*}
</div>
<div class="para">입니다. </div>
